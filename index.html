<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이벤트월드 — 참여 가능한 이벤트 모음</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --surface2: #efefef;
    --border: #e4e4e4;
    --accent: #e8322a;
    --accent2: #ff6b35;
    --text: #111111;
    --text2: #444444;
    --text3: #999999;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .view-btns { display: flex; gap: 6px; }

  .view-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text3);
  }

  .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .view-btn:hover:not(.active) { border-color: var(--text3); color: var(--text2); }

  .filter-section {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .filter-scroll {
    max-width: 1200px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 0;
    white-space: nowrap;
  }

  .filter-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  .filter-chip {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    flex-shrink: 0;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .stats-text { font-size: 14px; color: var(--text3); }
  .stats-text strong { color: var(--accent); font-weight: 700; }

  .sort-select {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text2);
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
    gap: 18px;
  }

  .event-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: all 0.25s;
    animation: fadeUp 0.35s ease both;
    display: flex;
    flex-direction: column;
  }

  .event-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    border-color: var(--accent);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .tag {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .tag.urgent { background: #fff1f0; color: var(--accent); border-color: #ffccc7; }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta { display: flex; flex-direction: column; gap: 5px; }

  .meta-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 13px;
    color: var(--text2);
  }

  .meta-icon { flex-shrink: 0; }
  .meta-prize { color: #d46b08; font-weight: 600; }

  .card-footer { padding: 0 16px 16px; }

  .participate-btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: var(--text);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    color: white;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: -0.2px;
  }

  .participate-btn:hover { background: var(--accent); }

  .list-view { display: none; }
  .list-view.active { display: flex; flex-direction: column; gap: 8px; }
  .card-grid.hidden { display: none; }

  .list-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  .list-item:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

  .list-thumb {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }

  .list-thumb-placeholder {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .list-content { flex: 1; min-width: 0; }

  .list-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
  }

  .list-btn {
    padding: 10px 18px;
    background: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: inherit;
    transition: all 0.2s;
  }

  .list-btn:hover { background: var(--accent); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .card-grid { grid-template-columns: 1fr; }
    .list-meta { font-size: 12px; gap: 6px; }
    .list-btn { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="https://eventworld.kr" class="logo">
      <div class="logo-icon">🎁</div>
      <div class="logo-text">이벤트<span>월드</span></div>
    </a>
    <div class="view-btns">
      <button class="view-btn active" id="btnCard" onclick="setView('card')" title="카드 보기">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="0.5" y="0.5" width="6" height="6" rx="1.5" fill="currentColor"/>
          <rect x="8.5" y="0.5" width="6" height="6" rx="1.5" fill="currentColor"/>
          <rect x="0.5" y="8.5" width="6" height="6" rx="1.5" fill="currentColor"/>
          <rect x="8.5" y="8.5" width="6" height="6" rx="1.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="view-btn" id="btnList" onclick="setView('list')" title="리스트 보기">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="0.5" y="1.5" width="14" height="2.5" rx="1" fill="currentColor"/>
          <rect x="0.5" y="6.25" width="14" height="2.5" rx="1" fill="currentColor"/>
          <rect x="0.5" y="11" width="14" height="2.5" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="filter-section">
  <div class="filter-scroll">
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('전체', this)">전체</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('마감임박', this)">⏰ 마감임박</button>
      <button class="filter-chip" onclick="setFilter('오늘마감', this)">🔥 오늘마감</button>
      <button class="filter-chip" onclick="setFilter('이번주', this)">📅 이번주</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('고가경품', this)">💎 고가경품</button>
      <button class="filter-chip" onclick="setFilter('현금·상품권', this)">💵 현금·상품권</button>
      <button class="filter-chip" onclick="setFilter('커피·쿠폰', this)">☕ 커피·쿠폰</button>
      <button class="filter-chip" onclick="setFilter('여행·숙박', this)">✈️ 여행·숙박</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('초간단', this)">👆 초간단</button>
      <button class="filter-chip" onclick="setFilter('댓글·태그', this)">💬 댓글·태그</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('대기업', this)">🏢 대기업</button>
      <button class="filter-chip" onclick="setFilter('공공기관', this)">🏛️ 공공기관</button>
      <button class="filter-chip" onclick="setFilter('식품·음료', this)">🍔 식품·음료</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('부산', this)">📍 부산</button>
      <button class="filter-chip" onclick="setFilter('학생', this)">🎓 학생</button>
      <div class="filter-divider"></div>
      <button class="filter-chip" onclick="setFilter('인스타', this)">📸 인스타</button>
      <button class="filter-chip" onclick="setFilter('카카오', this)">💛 카카오</button>
      <button class="filter-chip" onclick="setFilter('네이버', this)">🟢 네이버</button>
    </div>
  </div>
</div>

<main>
  <div class="stats-bar">
    <div class="stats-text">총 <strong id="eventCount">0</strong>개 이벤트</div>
    <select class="sort-select" onchange="sortEvents(this.value)">
      <option value="latest">최신순</option>
      <option value="deadline">마감임박순</option>
      <option value="winner">당첨자 많은 순</option>
    </select>
  </div>

  <div class="card-grid" id="cardGrid"></div>
  <div class="list-view" id="listView"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="emoji">🔍</div>
    <p>해당 조건의 이벤트가 없어요</p>
  </div>
</main>

<script>
const EVENTS = [
  { id:1, title:"브이투샵 창고개방 행사", host:"벤타코리아", period:"2026.03.06 ~ 2026.03.15", prize:"네이버페이 3,000원", winners:"50명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=621984&no=1", thumbnail:"images/suto_0000.jpg", tags:["현금·상품권","네이버","초간단"] },
  { id:2, title:"맞춰봐요! 생명의 신호", host:"통영시정신건강복지센터", period:"2026.03.16 ~ 2026.03.27", prize:"편의점 모바일상품권 3,000원", winners:"150명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622771&no=1", thumbnail:"images/suto_0001.png", tags:["공공기관","현금·상품권","초간단"] },
  { id:3, title:"닥터오프쇼어 인스타그램 팔로우이벤트", host:"닥터오프쇼어", period:"2026.03.11 ~ 2026.03.14", prize:"비타민 케이3 에멀젼", winners:"3명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622756&no=1", thumbnail:"images/suto_0002.png", tags:["인스타","초간단"] },
  { id:4, title:"대한민국 대표팀 응원하고 선물 받자!", host:"웅진프리드라이프", period:"2026.03.11 ~ 2026.03.14", prize:"커피 기프티콘", winners:"25명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622755&no=1", thumbnail:"images/suto_0003.png", tags:["커피·쿠폰","댓글·태그","초간단"] },
  { id:5, title:"앰버서더(신제품 체험단) 이벤트", host:"어쎈트", period:"2026.03.12 ~ 2026.03.26", prize:"샴푸 & 컨디셔너", winners:"4명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622754&no=1", thumbnail:"images/suto_0004.png", tags:["식품·음료","인스타"] },
  { id:6, title:"헬시 티소다 티릿 스쿨어택! 총 200병", host:"티릿", period:"2026.03.10 ~ 2026.03.22", prize:"티릿 500ml 200병", winners:"1명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622753&no=1", thumbnail:"images/suto_0005.png", tags:["식품·음료","고가경품","댓글·태그"] },
  { id:7, title:"Galaxy S26 행사 기념 댓글 이벤트", host:"헬로모바일", period:"2026.03.12 ~ 2026.03.22", prize:"메가박스 1인 패키지 모바일 쿠폰", winners:"10명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622752&no=1", thumbnail:"images/suto_0006.png", tags:["대기업","댓글·태그","현금·상품권"] },
  { id:8, title:"어렸을 때 내가 좋아했던 교실 자리는?", host:"구몬학습", period:"2026.03.11 ~ 2026.03.17", prize:"스타벅스 러블리 하트 틴 초콜릿", winners:"20명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622750&no=1", thumbnail:"images/suto_0008.png", tags:["커피·쿠폰","초간단","학생"] },
  { id:9, title:"설레는 마음으로", host:"우리금융캐피탈", period:"2026.03.12 ~ 2026.03.24", prize:"이디야 커피", winners:"10명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622749&no=1", thumbnail:"images/suto_0009.png", tags:["커피·쿠폰","댓글·태그","대기업"] },
  { id:10, title:"부산투브 — 커피 쿠폰 증정 이벤트", host:"부산투브", period:"2026.03.12 ~ 2026.03.29", prize:"커피 쿠폰", winners:"10명", link:"https://www.suto.co.kr/bbs/link.php?bo_table=cpevent&wr_id=622741&no=1", thumbnail:"images/suto_0019.png", tags:["부산","커피·쿠폰","초간단"] }
];

let currentFilter = '전체';
let currentView = 'card';
let currentSort = 'latest';

function getDaysLeft(period) {
  if (!period) return null;
  const match = period.match(/(\d{4}[.\-]\d{1,2}[.\-]\d{1,2})\s*$/);
  if (!match) return null;
  const deadline = new Date(match[1].replace(/\./g, '-'));
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((deadline - today) / 86400000);
}

function getDeadlineLabel(period) {
  const d = getDaysLeft(period);
  if (d === null) return '';
  if (d < 0) return '종료';
  if (d === 0) return '오늘마감';
  return `D-${d}`;
}

function isUrgent(period) { const d = getDaysLeft(period); return d !== null && d >= 0 && d <= 5; }
function isToday(period) { return getDaysLeft(period) === 0; }
function isThisWeek(period) { const d = getDaysLeft(period); return d !== null && d >= 0 && d <= 7; }

function matchFilter(e, f) {
  if (f === '전체') return true;
  if (f === '마감임박') return isUrgent(e.period);
  if (f === '오늘마감') return isToday(e.period);
  if (f === '이번주') return isThisWeek(e.period);
  return e.tags && e.tags.includes(f);
}

function getFiltered() {
  let data = EVENTS.filter(e => matchFilter(e, currentFilter));
  if (currentSort === 'deadline') data.sort((a,b) => (getDaysLeft(a.period)??999)-(getDaysLeft(b.period)??999));
  else if (currentSort === 'winner') data.sort((a,b) => parseInt(b.winners)-parseInt(a.winners));
  return data;
}

function render() {
  const data = getFiltered();
  const cardGrid = document.getElementById('cardGrid');
  const listView = document.getElementById('listView');
  const emptyState = document.getElementById('emptyState');
  document.getElementById('eventCount').textContent = data.length;

  if (data.length === 0) {
    cardGrid.innerHTML = ''; listView.innerHTML = '';
    emptyState.style.display = 'block'; return;
  }
  emptyState.style.display = 'none';

  cardGrid.innerHTML = data.map((e, i) => {
    const urgent = isUrgent(e.period);
    const label = getDeadlineLabel(e.period);
    return `
    <div class="event-card" style="animation-delay:${i*0.04}s">
      ${e.thumbnail ? `<img class="card-thumb" src="${e.thumbnail}" alt="${e.title}" onerror="this.outerHTML='<div class=card-thumb-placeholder>🎁</div>'">` : `<div class="card-thumb-placeholder">🎁</div>`}
      <div class="card-body">
        <div class="card-tags">
          ${urgent ? `<span class="tag urgent">⏰ ${label}</span>` : ''}
          ${(e.tags||[]).slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="card-title">${e.title}</div>
        <div class="card-meta">
          <div class="meta-row"><span class="meta-icon">🏢</span><span>${e.host}</span></div>
          <div class="meta-row"><span class="meta-icon">🎁</span><span class="meta-prize">${e.prize}</span></div>
          <div class="meta-row"><span class="meta-icon">👥</span><span>당첨자 ${e.winners}</span></div>
          <div class="meta-row"><span class="meta-icon">📅</span><span>${e.period}</span></div>
        </div>
      </div>
      <div class="card-footer">
        <a href="${e.link}" target="_blank" class="participate-btn">참여하기 →</a>
      </div>
    </div>`;
  }).join('');

  listView.innerHTML = data.map((e, i) => {
    const urgent = isUrgent(e.period);
    const label = getDeadlineLabel(e.period);
    return `
    <div class="list-item" style="animation-delay:${i*0.03}s">
      ${e.thumbnail ? `<img class="list-thumb" src="${e.thumbnail}" alt="${e.title}" onerror="this.outerHTML='<div class=list-thumb-placeholder>🎁</div>'">` : `<div class="list-thumb-placeholder">🎁</div>`}
      <div class="list-content">
        <div class="list-title">${e.title}</div>
        <div class="list-meta">
          <span>🏢 ${e.host}</span>
          <span class="meta-prize">🎁 ${e.prize}</span>
          <span>👥 ${e.winners}</span>
          <span>📅 ${e.period}${urgent ? ` <b style="color:var(--accent)">⏰${label}</b>` : ''}</span>
        </div>
      </div>
      <a href="${e.link}" target="_blank" class="list-btn">참여하기 →</a>
    </div>`;
  }).join('');
}

function setView(view) {
  currentView = view;
  document.getElementById('btnCard').classList.toggle('active', view==='card');
  document.getElementById('btnList').classList.toggle('active', view==='list');
  document.getElementById('cardGrid').classList.toggle('hidden', view!=='card');
  document.getElementById('listView').classList.toggle('active', view==='list');
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortEvents(val) { currentSort = val; render(); }

render();
</script>
</body>
</html>
