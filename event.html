<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이벤트 상세 — 이벤트월드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --white: #ffffff;
    --border: #e4e4e4;
    --accent: #e8322a;
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    text-decoration: none;
    color: var(--text);
    flex-shrink: 0;
  }

  .header-logo img { height: 26px; width: auto; display: block; }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  .thumb-wrap {
    width: 100%;
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .thumb-img { width: 100%; display: block; object-fit: cover; }

  .thumb-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #fafafa;
  }

  .thumb-placeholder img { width: 120px; opacity: 0.4; }
  .thumb-placeholder p { font-size: 14px; color: var(--text3); }

  .info-card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .info-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.45;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.5px;
  }

  .info-row {
    display: flex;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }

  .info-row:last-child { border-bottom: none; }

  .info-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    width: 52px;
    flex-shrink: 0;
  }

  .info-value { font-size: 15px; color: var(--text); flex: 1; line-height: 1.5; }
  .info-value.prize { color: var(--accent); font-weight: 700; }

  .desc-card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .desc-header {
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    background: #fafafa;
  }

  .desc-body {
    padding: 20px;
    font-size: 15px;
    color: var(--text2);
    line-height: 1.9;
    white-space: pre-line;
    word-break: keep-all;
  }

  .participate-btn {
    display: block;
    width: 100%;
    padding: 17px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 800;
    color: white;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.3px;
  }

  .loading { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 16px; }

  @media (max-width: 600px) {
    .info-title { font-size: 18px; }
    .desc-body { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn">←</a>
    <a href="index.html" class="header-logo">
      <img src="logo.png" alt="EVENT WORLD">
    </a>
  </div>
</header>

<main id="main">
  <div class="loading">불러오는 중...</div>
</main>

<script>
async function loadDetail() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  if (!id) { window.location.href = 'index.html'; return; }

  try {
    const res = await fetch('events.json?t=' + Date.now());
    const events = await res.json();
    const e = events.find(ev => ev.id === id);

    if (!e) { window.location.href = 'index.html'; return; }

    document.title = (e.title || e.host) + ' — 이벤트월드';

    let thumbHtml = '';
    if (e.thumbnail) {
      thumbHtml = '<div class="thumb-wrap"><img class="thumb-img" src="' + e.thumbnail + '" alt="' + (e.title||'') + '" onerror="this.parentElement.innerHTML=\'<div class=thumb-placeholder><img src=logo.png alt=logo><p>등록된 포스터가 없어요</p></div>\'"></div>';
    } else {
      thumbHtml = '<div class="thumb-wrap"><div class="thumb-placeholder"><img src="logo.png" alt="logo"><p>등록된 포스터가 없어요</p></div></div>';
    }

    const descHtml = e.description
      ? '<div class="desc-card"><div class="desc-header">📋 이벤트 내용</div><div class="desc-body">' + e.description + '</div></div>'
      : '';

    document.getElementById('main').innerHTML =
      thumbHtml +
      '<div class="info-card">' +
        '<div class="info-title">' + (e.title || e.host) + '</div>' +
        '<div class="info-row"><span class="info-label">주최사</span><span class="info-value">' + e.host + '</span></div>' +
        '<div class="info-row"><span class="info-label">경품</span><span class="info-value prize">' + e.prize + '</span></div>' +
        '<div class="info-row"><span class="info-label">당첨자</span><span class="info-value">' + e.winners + '</span></div>' +
        '<div class="info-row"><span class="info-label">기간</span><span class="info-value">' + e.period + '</span></div>' +
      '</div>' +
      descHtml +
      '<a href="' + e.link + '" target="_blank" class="participate-btn">참여하기 →</a>';

  } catch(err) {
    document.getElementById('main').innerHTML = '<div class="loading">불러오기 실패</div>';
  }
}

loadDetail();
</script>
</body>
</html>
