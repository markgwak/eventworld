<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이벤트 상세 — 이벤트월드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #e8322a;
    --text: #111;
    --text2: #444;
    --text3: #999;
    --border: #eee;
    --bg: #f4f4f4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Pretendard',-apple-system,sans-serif; min-height:100vh; }

  /* 헤더 */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,0.97);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .header-inner {
    max-width:640px; margin:0 auto;
    height:54px; display:flex; align-items:center; padding:0 16px; gap:12px;
  }
  .back-btn {
    width:36px; height:36px; border-radius:50%;
    border:1px solid var(--border); background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; text-decoration:none; color:var(--text);
    flex-shrink:0; cursor:pointer;
  }
  .header-logo img { height:24px; width:auto; }

  /* 히어로 이미지 */
  .hero {
    width:100%; max-width:640px; margin:0 auto;
    background:#fff; position:relative; overflow:hidden;
  }
  .hero img {
    width:100%; display:block;
    max-height:420px; object-fit:cover;
  }
  .hero-placeholder {
    width:100%; aspect-ratio:1/1;
    max-height:360px;
    background:linear-gradient(160deg,#fff8f8,#fff3ee);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
  }
  .hero-placeholder img { width:100px; opacity:0.35; }
  .hero-placeholder p { font-size:14px; color:var(--text3); }

  /* 본문 */
  main {
    max-width:640px; margin:0 auto;
    padding:20px 16px 80px;
    display:flex; flex-direction:column; gap:14px;
  }

  /* 제목 카드 */
  .title-card {
    background:#fff; border-radius:20px;
    padding:22px 20px 18px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
  }
  .title-badge {
    display:inline-block;
    background:var(--accent); color:#fff;
    font-size:11px; font-weight:700;
    padding:3px 10px; border-radius:20px;
    margin-bottom:10px; letter-spacing:0.3px;
  }
  .title-text {
    font-size:21px; font-weight:900;
    color:var(--text); line-height:1.4;
    letter-spacing:-0.5px;
  }

  /* 경품 강조 카드 */
  .prize-card {
    background:linear-gradient(135deg,#e8322a,#ff6b35);
    border-radius:20px; padding:22px 20px;
    box-shadow:0 4px 20px rgba(232,50,42,0.25);
    display:flex; align-items:center; gap:16px;
  }
  .prize-icon { font-size:36px; flex-shrink:0; }
  .prize-label { font-size:12px; font-weight:600; color:rgba(255,255,255,0.75); margin-bottom:4px; }
  .prize-value { font-size:20px; font-weight:900; color:#fff; line-height:1.3; letter-spacing:-0.5px; }

  /* 정보 카드 */
  .info-card {
    background:#fff; border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    overflow:hidden;
  }
  .info-row {
    display:flex; align-items:center;
    padding:15px 20px; gap:14px;
    border-bottom:1px solid #f5f5f5;
  }
  .info-row:last-child { border-bottom:none; }
  .info-icon {
    width:38px; height:38px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .icon-host { background:#f0f4ff; }
  .icon-winners { background:#f0fff4; }
  .icon-period { background:#fff8f0; }
  .info-content {}
  .info-label { font-size:12px; color:var(--text3); font-weight:600; margin-bottom:2px; }
  .info-value { font-size:15px; font-weight:700; color:var(--text); }

  /* 설명 카드 */
  .desc-card {
    background:#fff; border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    overflow:hidden;
  }
  .desc-header {
    padding:16px 20px;
    font-size:14px; font-weight:800;
    color:var(--text); background:#fafafa;
    border-bottom:1px solid var(--border);
    letter-spacing:-0.2px;
  }
  .desc-body {
    padding:20px;
    font-size:15px; color:var(--text2);
    line-height:1.9; white-space:pre-line;
    word-break:keep-all;
  }

  /* 참여 버튼 */
  .btn-wrap { padding:0; }
  .participate-btn {
    display:block; width:100%;
    padding:18px;
    background:var(--text); border:none; border-radius:16px;
    font-size:17px; font-weight:800; color:#fff;
    text-align:center; text-decoration:none;
    font-family:inherit; letter-spacing:-0.3px;
    cursor:pointer; transition:background 0.2s;
  }
  .participate-btn:hover { background:var(--accent); }

  .loading { text-align:center; padding:80px 20px; color:var(--text3); font-size:16px; }

  @media (max-width:480px) {
    .title-text { font-size:19px; }
    .prize-value { font-size:18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn">←</a>
    <a href="index.html" class="header-logo">
      <img src="logo.png" alt="EVENT WORLD">
    </a>
  </div>
</header>

<div class="hero" id="heroWrap"></div>

<main id="main">
  <div class="loading">불러오는 중...</div>
</main>

<script>
async function loadDetail() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  if (!id) { window.location.href = 'index.html'; return; }

  try {
    const res = await fetch('events.json?t=' + Date.now());
    const events = await res.json();
    const e = events.find(ev => ev.id === id);
    if (!e) { window.location.href = 'index.html'; return; }

    document.title = (e.title || e.host) + ' — 이벤트월드';

    // 히어로
    const hero = document.getElementById('heroWrap');
    if (e.thumbnail) {
      hero.innerHTML = '<img src="' + e.thumbnail + '" alt="포스터" onerror="this.outerHTML=\'<div class=hero-placeholder><img src=logo.png><p>등록된 포스터가 없어요</p></div>\'">';
    } else {
      hero.innerHTML = '<div class="hero-placeholder"><img src="logo.png"><p>등록된 포스터가 없어요</p></div>';
    }

    // 설명글
    const descHtml = e.description
      ? '<div class="desc-card"><div class="desc-header">📋 이벤트 내용</div><div class="desc-body">' + e.description + '</div></div>'
      : '';

    document.getElementById('main').innerHTML =
      // 제목
      '<div class="title-card">' +
        '<div class="title-badge">🎪 이벤트</div>' +
        '<div class="title-text">' + (e.title || e.host) + '</div>' +
      '</div>' +

      // 경품
      '<div class="prize-card">' +
        '<div class="prize-icon">🎁</div>' +
        '<div>' +
          '<div class="prize-label">경품</div>' +
          '<div class="prize-value">' + e.prize + '</div>' +
        '</div>' +
      '</div>' +

      // 정보
      '<div class="info-card">' +
        '<div class="info-row">' +
          '<div class="info-icon icon-host">🏢</div>' +
          '<div class="info-content"><div class="info-label">주최사</div><div class="info-value">' + e.host + '</div></div>' +
        '</div>' +
        '<div class="info-row">' +
          '<div class="info-icon icon-winners">👥</div>' +
          '<div class="info-content"><div class="info-label">당첨자</div><div class="info-value">' + e.winners + '</div></div>' +
        '</div>' +
        '<div class="info-row">' +
          '<div class="info-icon icon-period">📅</div>' +
          '<div class="info-content"><div class="info-label">응모 기간</div><div class="info-value">' + e.period + '</div></div>' +
        '</div>' +
      '</div>' +

      // 설명
      descHtml +

      // 버튼
      '<div class="btn-wrap"><a href="' + e.link + '" target="_blank" class="participate-btn">지금 참여하기 →</a></div>';

  } catch(err) {
    document.getElementById('main').innerHTML = '<div class="loading">불러오기 실패</div>';
  }
}

loadDetail();
</script>
</body>
</html>
